name: Build

on:
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/andrewtheguy/save_audio_stream

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine and validate version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Extract version from Cargo.toml
          VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          if [ -z "$VERSION" ]; then
            echo "Could not determine version from Cargo.toml" >&2
            exit 1
          fi

          TAG="v${VERSION}"
          echo "Release tag: ${TAG}"

          # Check if tag already exists
          if gh api "repos/${GH_REPO}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Bump the version in Cargo.toml before releasing." >&2
            exit 1
          fi

          # Prerelease if not on main branch
          IS_PRERELEASE="false"
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            IS_PRERELEASE="true"
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT

  build-linux:
    needs: prepare
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            docker_platform: linux/amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
            docker_platform: linux/arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get install -y cmake pkg-config

      - name: Build
        run: cargo build --release

      - name: Rename binary
        run: mv target/release/save_audio_stream target/release/save_audio_stream-linux-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: save_audio_stream-linux-${{ matrix.arch }}
          path: target/release/save_audio_stream-linux-${{ matrix.arch }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (using pre-built binary)
        run: |
          TAG=${{ needs.prepare.outputs.tag }}
          # Copy binary to build context root for Dockerfile
          cp target/release/save_audio_stream-linux-${{ matrix.arch }} save_audio_stream
          docker build --target runtime-prebuilt -t ${{ env.GHCR_IMAGE }}:${TAG}-${{ matrix.arch }} .
          docker push ${{ env.GHCR_IMAGE }}:${TAG}-${{ matrix.arch }}

  release:
    needs: [prepare, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          files: artifacts/*
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          TAG=${{ needs.prepare.outputs.tag }}
          # Create manifest combining both architectures
          docker manifest create ${{ env.GHCR_IMAGE }}:${TAG} \
            ${{ env.GHCR_IMAGE }}:${TAG}-x86_64 \
            ${{ env.GHCR_IMAGE }}:${TAG}-arm64
          docker manifest push ${{ env.GHCR_IMAGE }}:${TAG}

          # Only tag as latest on non-prerelease (main branch) builds
          if [ "${{ needs.prepare.outputs.is_prerelease }}" = "false" ]; then
            docker manifest create ${{ env.GHCR_IMAGE }}:latest \
              ${{ env.GHCR_IMAGE }}:${TAG}-x86_64 \
              ${{ env.GHCR_IMAGE }}:${TAG}-arm64
            docker manifest push ${{ env.GHCR_IMAGE }}:latest
          fi

  # Windows build is separate and creates its own release with -windows suffix
  build-windows:
    needs: prepare
    runs-on: windows-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: TAServers/vcpkg-cache@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies via vcpkg
        env:
          VCPKG_FEATURE_FLAGS: "binarycaching"
          VCPKG_BINARY_SOURCES: "clear;files,${{ steps.vcpkg-cache.outputs.path }},readwrite"
        run: vcpkg install fdk-aac:x64-windows opus:x64-windows

      - name: Build
        run: cargo build --release

      - name: Rename binary
        run: mv target/release/save_audio_stream.exe target/release/save_audio_stream-windows-x86_64.exe

      - name: Create Windows release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}-windows
          name: ${{ needs.prepare.outputs.tag }}-windows
          files: target/release/save_audio_stream-windows-x86_64.exe
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
